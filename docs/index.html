<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ferðadagbók</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>html { background: #131E17; }</style>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="topbar">
<a href="index.html" class="site-name">Fer&eth;adagb&oacute;k</a>
<nav><a href="blog.html">Dagbók</a><a href="gallery.html">Myndir</a><a href="videos.html">Myndbönd</a></nav>
</div>
<div class="landing-hero">
<div class="hero-title">Fer&eth; um Ind&oacute;nes&iacute;u</div>
<div class="hero-route">Jakarta &rarr; B&oacute;rneó &rarr; S&uacute;lawesi &rarr; Flores &rarr; Jakarta</div>
<div class="hero-dates">1. ma&iacute; &ndash; 6. j&uacute;n&iacute; 2026</div>
</div>
<div class="map-section">
<div class="map-wrap">
<div id="map" class="map-container"></div>
<div class="map-hint">Smelltu &aacute; punktana til a&eth; lesa f&aelig;rslur</div>
</div>
<div class="map-stats">
<span>2 f&aelig;rslur</span>
<span>1 myndir</span>
<span>0 myndb&ouml;nd</span>
</div>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
    var map = L.map('map', {
        zoomControl: false,
        attributionControl: false
    }).setView([-4.5, 115.5], 5);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13
    }).addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13
    }).addTo(map);

    var route = [[-6.2088, 106.8456], [-2.7833, 111.9], [-5.1477, 119.4327], [-2.9667, 119.9], [-5.1477, 119.4327], [-8.4967, 119.8889], [-8.7914, 120.9722], [-8.8488, 121.6608], [-6.2088, 106.8456]];
    L.polyline(route, {
        color: '#C4944A',
        weight: 2,
        opacity: 0.45,
        dashArray: '6, 8',
        smoothFactor: 1.5
    }).addTo(map);

    var markers = [{"name": "Jakarta", "lat": -6.1754049, "lng": 106.827168, "entries": [{"title": "Dagur 1 - Jakarta", "date": "2026-04-30", "slug": "2026-04-30-dagur-1-jakarta"}]}, {"name": "Tanjung Puting", "lat": -3.5038484, "lng": 111.7705804, "entries": [{"title": "Dagur 2 - Tanjung Puting", "date": "2026-04-30", "slug": "2026-04-30-dagur-2-tanjung-puting"}]}];
    if (markers.length > 1) {
        var travelled = markers.map(function(m) { return [m.lat, m.lng]; });
        L.polyline(travelled, {
            color: '#D45D4C',
            weight: 2.5,
            opacity: 0.8,
            smoothFactor: 1.5
        }).addTo(map);
    }

    var pinIcon = L.divIcon({
        className: 'map-pin',
        html: '<div class="pin-dot"></div><div class="pin-pulse"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
        popupAnchor: [0, -14]
    });

    var stopIcon = L.divIcon({
        className: 'map-stop',
        html: '<div class="stop-dot"></div>',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
    });

    var visitedKeys = {};
    markers.forEach(function(m) { visitedKeys[m.lat + ',' + m.lng] = true; });
    route.forEach(function(coord) {
        var key = coord[0] + ',' + coord[1];
        if (!visitedKeys[key]) {
            visitedKeys[key] = true;
            L.marker(coord, { icon: stopIcon }).addTo(map);
        }
    });

    markers.forEach(function(loc) {
        var popupLines = '<div class="popup-title">' + loc.name + '</div>';
        loc.entries.forEach(function(e) {
            popupLines += '<a href="' + e.slug + '.html"><span class="popup-date">' + e.date + '</span> ' + e.title.replace(/.*?—\s*/, '') + '</a><br>';
        });
        L.marker([loc.lat, loc.lng], { icon: pinIcon })
            .bindPopup(popupLines, { maxWidth: 240 })
            .addTo(map);
    });
})();
</script></body>
</html>
