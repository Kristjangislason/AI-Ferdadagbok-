<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ferðadagbók</title>
<style>*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --text: #1d1d1f;
    --muted: #6e6e73;
    --bg: #fff;
    --max-width: 640px;
}

body {
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    color: var(--text);
    background: var(--bg);
    line-height: 1.9;
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 80px 24px;
}

header {
    margin-bottom: 80px;
}

header a {
    text-decoration: none;
    color: inherit;
}

header h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    color: var(--text);
}

header p {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
}

article h1 {
    font-size: 32px;
    line-height: 1.3;
    margin-bottom: 40px;
    letter-spacing: -0.01em;
}

article p {
    margin-bottom: 24px;
}

.entry-list {
    list-style: none;
}

.entry-list li {
    margin-bottom: 32px;
}

.entry-list a {
    text-decoration: none;
    color: var(--text);
    display: block;
}

.entry-list a:hover .entry-title {
    color: var(--muted);
}

.entry-title {
    font-size: 22px;
    line-height: 1.4;
    transition: color 0.2s;
}

.entry-date {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
}

nav.back {
    margin-bottom: 60px;
}

nav.back a {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px;
    color: var(--muted);
    text-decoration: none;
}

nav.back a:hover {
    color: var(--text);
}

@media (max-width: 600px) {
    .container { padding: 48px 20px; }
    header { margin-bottom: 48px; }
    article h1 { font-size: 26px; margin-bottom: 32px; }
    .entry-title { font-size: 19px; }
}
</style>
</head>

</div>

</html>
