<!DOCTYPE html>
<html lang="is">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ferðadagbók</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>html { background: #131E17; }</style>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<div class="topbar">
<a href="index.html" class="site-name">Fer&eth;adagb&oacute;k</a>
<nav><a href="blog.html">Dagbók</a><a href="gallery.html">Myndir</a><a href="videos.html">Myndbönd</a></nav>
</div>
<div class="landing-hero">
<div class="hero-title">Fer&eth; um Ind&oacute;nes&iacute;u</div>
<div class="hero-route">Kristj&aacute;n G&iacute;slason og India Br&iacute;et B&ouml;&eth;varsd&oacute;ttir Terry</div>
<div class="hero-dates">1. ma&iacute; &ndash; 6. j&uacute;n&iacute; 2026</div>
</div>
<div class="map-section">
<div class="map-wrap">
<div id="map" class="map-container"></div>
<div class="map-hint">Smelltu &aacute; punktana til a&eth; lesa f&aelig;rslur</div>
</div>
<div class="map-stats">
<span>3 f&aelig;rslur</span>
<span>1 mynd</span>
<span>0 myndb&ouml;nd</span>
</div>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
    var map = L.map('map', {
        zoomControl: false,
        attributionControl: false
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13
    }).addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13
    }).addTo(map);

    var markers = [{"name": "Jakarta", "lat": -6.1754049, "lng": 106.827168, "entries": [{"title": "Dagur 1 - Jakarta", "date": "30. apríl 2026", "slug": "2026-04-30-dagur-1-jakarta"}]}, {"name": "Tanjung Puting", "lat": -3.5038484, "lng": 111.7705804, "entries": [{"title": "Dagur 2 - Tanjung Puting", "date": "30. apríl 2026", "slug": "2026-04-30-dagur-2-tanjung-puting"}]}, {"name": "Makassar", "lat": -5.1342962, "lng": 119.4124282, "entries": [{"title": "Dagur 3 - Sulawesi", "date": "30. apríl 2026", "slug": "2026-04-30-dagur-3-sulawesi"}]}];

    var pinIcon = L.divIcon({
        className: 'map-pin',
        html: '<div class="pin-dot"></div><div class="pin-pulse"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10],
        popupAnchor: [0, -14]
    });

    markers.forEach(function(loc) {
        var popup = '<div class="popup-title">' + loc.name + '</div>';
        loc.entries.forEach(function(e) {
            popup += '<a href="' + e.slug + '.html"><span class="popup-date">' + e.date + '</span> ' + e.title + '</a><br>';
        });
        L.marker([loc.lat, loc.lng], { icon: pinIcon })
            .bindPopup(popup, { maxWidth: 260 })
            .addTo(map);
    });

    if (markers.length === 0) {
        map.setView([-4.5, 115.5], 5);
    } else if (markers.length === 1) {
        map.setView([markers[0].lat, markers[0].lng], 7);
    } else {
        var bounds = L.latLngBounds(markers.map(function(m) { return [m.lat, m.lng]; }));
        map.fitBounds(bounds, { padding: [60, 60], maxZoom: 8 });
    }
})();
</script></body>
</html>
